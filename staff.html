<!DOCTYPE html>
<html>

<head>

    <title>Suresh Tailor Staff Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    
    <div class="login-container" id="loginPage">

        <h1>🔐 Staff Login</h1>
        <p class="login-subtitle">
        Suresh Tailor Management System
        </p>

        <input type="email" id="email" placeholder="Email">

        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

    </div>

        <div class="dashboard" id="dashboard" style="display:none;">       

      
    <div class="dashboard-header">

    <h1>✂️ SURESH TAILOR</h1>

    <p>Professional Management Dashboard</p>

    </div>
    <div style="text-align:center; margin-bottom:20px;">

    <a href="https://docs.google.com/spreadsheets/d/1KyjNuy8RzJz3UIWnMJ3Eh2DAkArvBBUV7XGW4YXZCF0/edit?gid=0#gid=0"
       target="_blank">

        <button>
            📋 VIEW ALL ORDERS
        </button>

    </a>

    </div>
    <div class="stats-container">

    <div class="stat-card">
        <h2>📋</h2>
        <h3>Total Orders</h3>
        <p>0</p>
    </div>

    <div class="stat-card">
        <h2>🟢</h2>
        <h3>Delivered</h3>
        <p>0</p>
    </div>

    <div class="stat-card">
        <h2>🟡</h2>
        <h3>Pending</h3>
        <p>0</p>
    </div>

    <div class="stat-card">
        <h2>💰</h2>
        <h3>Revenue</h3>
        <p>₹0</p>
    </div>

</div>

    <div class="customer-form">

        <input type="text"
        id="workerName"
        placeholder="Worker Name">

        <input type="text"
        id="customerId"
        placeholder="Customer ID">

        <input type="text"
        id="customerName"
        placeholder="Customer Name">

        <input type="text"
        id="phoneNumber"
        placeholder="Phone Number">

        <label>Pickup Date</label>
        <input type="date"
        id="pickupDate">

        <label>Delivery Date</label>
        <input type="date"
        id="deliveryDate">

        <input type="text"
        id="dressType"
        placeholder="Dress Type">

        <input type="number"
        id="totalAmount"
        placeholder="Total Amount">

        <select id="paymentStatus">
            <option>Paid</option>
            <option>Unpaid</option>
        </select>

        <select id="orderStatus">
            <option>Pending</option>
            <option>In Progress</option>
            <option>Ready</option>
            <option>Delivered</option>
        </select>

        <textarea
        id="notes"
        placeholder="Notes"></textarea>

        <button onclick="saveCustomer()">
            SAVE CUSTOMER
        </button>
        <button onclick="downloadBill()">
                🧾 DOWNLOAD BILL
        </button>

        <button onclick="clearForm()">
            CLEAR FORM
        </button>

    </div>

</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>


</body>

</html>
